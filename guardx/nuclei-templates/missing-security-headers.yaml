id: missing-security-headers

info:
  name: Missing Security Headers
  author: guardx
  severity: medium
  description: |
    Detects missing critical security headers such as:
    Content-Security-Policy (CSP), X-Frame-Options, X-Content-Type-Options,
    Strict-Transport-Security (HSTS), and others that protect against
    XSS, clickjacking, and other attacks.
  reference:
    - https://owasp.org/www-project-secure-headers/
  tags:
    - headers
    - security
    - exposure

http:
  - method: GET
    path:
      - "/"

    matchers:
      - type: dsl
        dsl:
          - "!contains(header, 'Strict-Transport-Security')"
          - "!contains(header, 'Content-Security-Policy')"
          - "!contains(header, 'X-Frame-Options')"
          - "!contains(header, 'X-Content-Type-Options')"
        condition: or

    extractors:
      - type: regex
        part: header
        regex:
          - "(?i)^([a-z-]+):"
