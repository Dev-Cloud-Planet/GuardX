id: exposed-env

info:
  name: Exposed .env File
  author: guardx
  severity: critical
  description: |
    Detects exposed .env files containing sensitive environment variables such as:
    database passwords, API keys, secret tokens, and other credentials.
  reference:
    - https://owasp.org/www-community/Sensitive_Data_Exposure
  tags:
    - exposure
    - env
    - sensitive

http:
  - method: GET
    path:
      - "/.env"
      - "/.env.local"
      - "/.env.production"
      - "/.env.development"
      - "/.env.staging"

    matchers:
      - type: word
        words:
          - "DB_PASSWORD"
          - "API_KEY"
          - "SECRET"
          - "TOKEN"
          - "DATABASE_URL"
          - "PRIVATE_KEY"
          - "CLIENT_SECRET"
        condition: or
        part: body

    matchers-condition: and

    extractors:
      - type: regex
        part: body
        regex:
          - "DB_PASSWORD=([^\\n\\r]+)"
          - "API_KEY=([^\\n\\r]+)"
          - "SECRET=([^\\n\\r]+)"
          - "TOKEN=([^\\n\\r]+)"
          - "DATABASE_URL=([^\\n\\r]+)"
          - "PRIVATE_KEY=([^\\n\\r]+)"
          - "CLIENT_SECRET=([^\\n\\r]+)"
