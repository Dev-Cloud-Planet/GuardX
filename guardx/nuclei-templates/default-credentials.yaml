id: default-credentials

info:
  name: Default Credentials Detection
  author: guardx
  severity: high
  description: |
    Detects common default login pages and attempts to identify
    applications with default credentials such as:
    admin/admin, admin/password, root/root, etc.
  reference:
    - https://owasp.org/www-community/attacks/Default_Accounts
  tags:
    - auth
    - default
    - credentials

http:
  - method: GET
    path:
      - "/login"
      - "/login.php"
      - "/admin/login"
      - "/user/login"
      - "/index.php?page=login"
      - "/wp-login.php"
      - "/administrator"
      - "/user"

    matchers:
      - type: word
        words:
          - "password"
          - "username"
          - "login"
        condition: or
        part: body

    matchers-condition: and

    extractors:
      - type: regex
        part: body
        regex:
          - "(?i)<input[^>]*name=[\"']?(username|user|login)[\"']?"
          - "(?i)<input[^>]*name=[\"']?(password|pass)[\"']?"

  - method: POST
    path:
      - "/login"
      - "/login.php"
      - "/admin/login"

    body: "username=admin&password=admin"

    headers:
      Content-Type: "application/x-www-form-urlencoded"

    matchers:
      - type: status
        status:
          - 302
          - 200

      - type: word
        words:
          - "dashboard"
          - "welcome"
          - "logout"
        part: body
        condition: or
